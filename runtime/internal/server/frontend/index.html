<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mino Runtime — Iron Tree Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
    --border: #30363d;
    --card: #161b22;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    padding: 2rem;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
  .status { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem; }
  .task-list { display: grid; gap: 0.75rem; }
  .task {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .task-info { display: flex; flex-direction: column; gap: 0.25rem; }
  .task-key { font-weight: 600; }
  .task-meta { color: var(--muted); font-size: 0.875rem; }
  .stage {
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .stage-definition { background: #21262d; color: var(--muted); }
  .stage-task { background: #341a00; color: var(--warn); }
  .stage-run { background: #0d1d30; color: var(--accent); }
  .stage-verify { background: #1d0d30; color: #a371f7; }
  .stage-checkup { background: #0d301d; color: var(--success); }
  .stage-done { background: #0d301d; color: var(--success); }
  .stage-halted { background: #300d0d; color: var(--danger); }
  .actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--card); color: var(--fg); border: 1px solid var(--border); }
  .log {
    margin-top: 1.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 0.8125rem;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--muted);
  }
  .log .event { color: var(--fg); margin-bottom: 0.25rem; }
</style>
</head>
<body>
<h1>Iron Tree Dashboard</h1>
<div class="status" id="conn-status">Connecting...</div>

<div class="actions">
  <button onclick="fetchTasks()">Refresh</button>
  <button class="secondary" onclick="dryRun(23)">Dry-run #23</button>
</div>

<div class="task-list" id="tasks">
  <div class="task">
    <div class="task-info">
      <span class="task-key">Loading...</span>
    </div>
  </div>
</div>

<div class="log" id="log"></div>

<script>
const logEl = document.getElementById('log');
const statusEl = document.getElementById('conn-status');

function log(msg) {
  const line = document.createElement('div');
  line.className = 'event';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// WebSocket with auto-reconnect and heartbeat
let ws = null;
let reconnectDelay = 1000;
const maxReconnectDelay = 30000;
let heartbeatTimer = null;
let missedHeartbeats = 0;
const maxMissedHeartbeats = 2;

function connectWS() {
  ws = new WebSocket(`ws://${location.host}/api/v1/ws`);

  ws.onopen = () => {
    statusEl.textContent = 'Connected';
    statusEl.style.color = 'var(--success)';
    log('WebSocket connected');
    reconnectDelay = 1000;
    missedHeartbeats = 0;
    startHeartbeat();
  };

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    if (data.type === 'ping') {
      missedHeartbeats = 0;
      ws.send(JSON.stringify({type: 'pong'}));
      return;
    }
    log(`Event: ${data.type} — ${JSON.stringify(data.payload || {})}`);
    if (data.type === 'command_completed') fetchTasks();
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected — reconnecting...';
    statusEl.style.color = 'var(--warn)';
    log('WebSocket closed, will reconnect');
    stopHeartbeat();
    setTimeout(connectWS, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
  };

  ws.onerror = (err) => {
    log('WebSocket error');
  };
}

function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    missedHeartbeats++;
    if (missedHeartbeats > maxMissedHeartbeats) {
      log('Heartbeat timeout, forcing reconnect');
      ws.close();
    }
  }, 35000);
}

function stopHeartbeat() {
  if (heartbeatTimer) {
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
  }
}

connectWS();

// API helpers
async function fetchTasks() {
  try {
    const res = await fetch('/api/v1/tasks');
    const data = await res.json();
    renderTasks(data.tasks || []);
  } catch (e) {
    log(`fetchTasks error: ${e.message}`);
  }
}

async function fetchState(issue) {
  try {
    const res = await fetch(`/api/v1/state?issue=${issue}`);
    return await res.json();
  } catch (e) {
    log(`fetchState error: ${e.message}`);
    return null;
  }
}

async function dryRun(issue) {
  log(`Dry-run #${issue}...`);
  try {
    const res = await fetch('/api/v1/commands', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'step',
        target: { issue },
        dry_run: true
      })
    });
    const data = await res.json();
    log(`Dry-run result: ${JSON.stringify(data)}`);
  } catch (e) {
    log(`dryRun error: ${e.message}`);
  }
}

async function sendCommand(type, issue) {
  log(`${type} #${issue}...`);
  try {
    const res = await fetch('/api/v1/commands', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, target: { issue } })
    });
    const data = await res.json();
    log(`Command accepted: ${data.command_id}`);
  } catch (e) {
    log(`${type} error: ${e.message}`);
  }
}

// HITL action wrappers
const stepIssue = (issue) => sendCommand('step', issue);
const approveIssue = (issue) => sendCommand('approve', issue);
const skipIssue = (issue) => sendCommand('skip', issue);
const cancelIssue = (issue) => sendCommand('cancel', issue);
const retryIssue = (issue) => sendCommand('retry', issue);

function renderHITL(state) {
  const stage = state.stage;
  const issue = state.issue;
  if (stage === 'done') return '';
  if (stage === 'halted') {
    return `
      <button class="secondary" onclick="retryIssue(${issue})">Retry</button>
      <button class="secondary" onclick="skipIssue(${issue})">Skip</button>
      <button class="secondary" onclick="cancelIssue(${issue})">Cancel</button>
    `;
  }
  return `
    <button onclick="stepIssue(${issue})">Step</button>
    <button class="secondary" onclick="skipIssue(${issue})">Skip</button>
    <button class="secondary" onclick="cancelIssue(${issue})">Cancel</button>
  `;
}

function renderTasks(tasks) {
  const container = document.getElementById('tasks');
  if (tasks.length === 0) {
    loadKnownIssues();
    return;
  }
  container.innerHTML = tasks.map(t => `
    <div class="task">
      <div class="task-info">
        <span class="task-key">${t.task_key}</span>
        <span class="task-meta">Issue #${t.issue} — ${t.stage}</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span class="stage stage-${t.stage}">${t.stage}</span>
        ${renderHITL(t)}
      </div>
    </div>
  `).join('');
}

async function loadKnownIssues() {
  const issues = [23, 24, 25, 26];
  const container = document.getElementById('tasks');
  container.innerHTML = '';
  for (const issue of issues) {
    const state = await fetchState(issue);
    if (!state) continue;
    const el = document.createElement('div');
    el.className = 'task';
    el.innerHTML = `
      <div class="task-info">
        <span class="task-key">${state.task_key}</span>
        <span class="task-meta">Issue #${state.issue} — Attempt ${state.attempt}/${state.max_retry}</span>
        ${state.stage === 'halted' ? `<span class="task-meta" style="color:var(--danger)">Halted — manual intervention required</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span class="stage stage-${state.stage}">${state.stage}</span>
        ${renderHITL(state)}
      </div>
    `;
    container.appendChild(el);
  }
}

// Initial load
loadKnownIssues();
</script>
</body>
</html>
